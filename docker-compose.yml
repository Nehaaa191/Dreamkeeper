version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dreamkeeper_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dreamkeeper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dreamkeeper_network

  # 2. Redis Cache & BullMQ Queue Manager
  redis:
    image: redis:7-alpine
    container_name: dreamkeeper_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dreamkeeper_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dreamkeeper_network:
    driver: bridge
